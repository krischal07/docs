openapi: 3.1.0
info:
  title: Samparka RestroX Native Integration API
  version: 1.1.0
  description: |
    External partner guide for the RestroX native integration with Samparka.

    The native partner APIs handle merchant connection, location sync, and
    partner customer operations. Event delivery continues through the existing
    RestroX webhook-backed event pipeline.
servers:
  - url: https://your-domain
security:
  - PartnerKeyHeader: []
paths:
  /api/partners/restrox/connect:
    post:
      summary: Connect a merchant using a Connection Key
      description: |
        Validate a RestroX Connection Key, associate partner account metadata,
        and optionally sync locations during the same request.
      operationId: connectRestroxMerchant
      security:
        - PartnerKeyHeader: []
        - PartnerBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerConnectRequest'
            examples:
              connectMerchant:
                summary: Connect merchant
                value:
                  integrationKey: SPK-RX-ABC12345
                  account:
                    id: restrox-account-001
                    name: Java Express
                  locations:
                    - externalLocationId: ktm-branch-01
                      externalLocationName: Kathmandu Branch
      responses:
        '200':
          description: Merchant connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerSuccessEnvelope'
              examples:
                connected:
                  value:
                    success: true
                    message: RestroX connected
                    data:
                      syncedCount: 1
                      reviewIssues: []
                      reviewRequired: false
                      partnerConnectionStatus: connected
        '401':
          description: Unauthorized partner request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
              examples:
                unauthorized:
                  value:
                    success: false
                    message: Unauthorized partner request
        '404':
          description: Invalid Connection Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
              examples:
                invalidKey:
                  value:
                    success: false
                    message: Invalid Integration Key
        '503':
          description: Partner API not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
              examples:
                notConfigured:
                  value:
                    success: false
                    message: RestroX partner API is not configured
  /api/partners/restrox/sync-locations:
    post:
      summary: Synchronize RestroX locations
      description: |
        Sync external RestroX locations into Samparka and return review issues
        when locations cannot be matched automatically.
      operationId: syncRestroxLocations
      security:
        - PartnerKeyHeader: []
        - PartnerBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerConnectRequest'
            examples:
              syncLocations:
                summary: Sync locations
                value:
                  integrationKey: SPK-RX-ABC12345
                  account:
                    id: restrox-account-001
                    name: Java Express
                  locations:
                    - externalLocationId: ktm-branch-01
                      externalLocationName: Kathmandu Branch
                    - externalLocationId: pokhara-branch-02
                      externalLocationName: Pokhara Branch
      responses:
        '200':
          description: Locations synchronized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerSuccessEnvelope'
              examples:
                synced:
                  value:
                    success: true
                    message: Locations synchronized
                    data:
                      syncedCount: 2
                      reviewIssues: []
                      reviewRequired: false
                      partnerConnectionStatus: connected
  /api/partners/restrox/test-sale:
    post:
      summary: Submit a test sale through the native partner API
      description: |
        Forward a RestroX sale payload into the existing provider event pipeline.
      operationId: submitRestroxTestSale
      security:
        - PartnerKeyHeader: []
        - PartnerBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestSaleRequest'
            examples:
              testSale:
                summary: Submit test sale
                value:
                  integrationKey: SPK-RX-ABC12345
                  payload:
                    event_type: order.completed
                    order_id: restrox-sale-1001
                    created_at: '2026-06-08T10:15:00.000Z'
                    amount: 850
                    currency: NPR
                    customer:
                      phone: '9801234567'
                    external_location_id: ktm-branch-01
                    external_location_name: Kathmandu Branch
                    items:
                      - name: Cappuccino
                        qty: 1
                        price: 850
      responses:
        '200':
          description: Test sale submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestSaleEnvelope'
              examples:
                submitted:
                  value:
                    success: true
                    message: Test sale submitted
                    data:
                      success: true
                      message: Event received
  /api/partners/{provider}/customers/search:
    get:
      summary: Search for a customer by exact phone
      description: |
        Search for a customer within the store linked to the provided
        Connection Key. The current implementation supports exact phone lookup
        only.
      operationId: searchPartnerCustomer
      security:
        - PartnerKeyHeader: []
        - PartnerBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/provider'
        - $ref: '#/components/parameters/integrationKeyHeader'
        - name: phone
          in: query
          required: true
          schema:
            type: string
          description: Customer phone number to normalize and search.
      responses:
        '200':
          description: Search completed
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CustomerSearchFound'
                  - $ref: '#/components/schemas/CustomerSearchMissing'
              examples:
                found:
                  value:
                    exists: true
                    customer:
                      id: 687000000000000000000001
                      name: Asha
                      phone: '9801234567'
                      email: asha@example.com
                      points: 45
                      tier: Bronze Tier
                      lifetimePoints: 45
                      membershipSince: '2026-06-08T10:15:00.000Z'
                missing:
                  value:
                    exists: false
        '400':
          description: Invalid search request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerError'
              examples:
                invalidPhone:
                  value:
                    error: partner_customer_error
                    message: Invalid phone number
                unsupportedSearch:
                  value:
                    error: partner_customer_error
                    message: Search supports exact phone lookup only
        '409':
          description: Customer identity conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerError'
              examples:
                conflict:
                  value:
                    error: customer_identity_conflict
                    message: Multiple customer records share the same normalized phone. Admin resolution is required.
  /api/partners/{provider}/customers:
    post:
      summary: Create a customer or return an existing one
      operationId: createPartnerCustomer
      security:
        - PartnerKeyHeader: []
        - PartnerBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/provider'
        - $ref: '#/components/parameters/integrationKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerCustomerCreateRequest'
      responses:
        '200':
          description: Customer created or existing customer returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerResponse'
  /api/partners/{provider}/customers/upsert:
    post:
      summary: Create or return existing customer by normalized phone
      operationId: upsertPartnerCustomer
      security:
        - PartnerKeyHeader: []
        - PartnerBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/provider'
        - $ref: '#/components/parameters/integrationKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerCustomerCreateRequest'
      responses:
        '200':
          description: Upsert completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerUpsertResponse'
  /api/partners/{provider}/customers/{customerId}:
    get:
      summary: Get one customer by ID
      operationId: getPartnerCustomer
      security:
        - PartnerKeyHeader: []
        - PartnerBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/provider'
        - $ref: '#/components/parameters/integrationKeyHeader'
        - $ref: '#/components/parameters/customerId'
      responses:
        '200':
          description: Customer fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerResponse'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerError'
              examples:
                notFound:
                  value:
                    error: partner_customer_error
                    message: Customer not found
    patch:
      summary: Update a customer
      operationId: updatePartnerCustomer
      security:
        - PartnerKeyHeader: []
        - PartnerBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/provider'
        - $ref: '#/components/parameters/integrationKeyHeader'
        - $ref: '#/components/parameters/customerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartnerCustomerUpdateRequest'
      responses:
        '200':
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerResponse'
        '400':
          description: Invalid update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerError'
              examples:
                invalidFields:
                  value:
                    error: partner_customer_error
                    message: Only name and email can be updated
        '409':
          description: Duplicate email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerError'
              examples:
                duplicateEmail:
                  value:
                    error: partner_customer_error
                    message: Email already exists
  /webhook/restrox/{token}:
    post:
      summary: Receive RestroX webhook events
      description: |
        Send RestroX sale, refund, or void webhooks to Samparka.
        A 200 acknowledgment means the delivery was accepted. It does not guarantee loyalty activity was created.
      operationId: postRestroxWebhook
      parameters:
        - name: token
          in: path
          required: true
          description: Webhook token supplied by Samparka.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestroxWebhookRequest'
            examples:
              saleCompleted:
                summary: Completed sale
                value:
                  event_type: order.completed
                  order_id: restrox-sale-1001
                  created_at: '2026-06-08T10:15:00.000Z'
                  amount: 850
                  currency: NPR
                  customer:
                    phone: '9800000101'
                  external_location_id: ktm-branch-01
                  external_location_name: Kathmandu Branch
                  items:
                    - name: Cappuccino
                      qty: 1
                      price: 850
      responses:
        '200':
          description: Event accepted or duplicate acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                eventReceived:
                  value:
                    success: true
                    message: Event received
                eventAlreadyProcessed:
                  value:
                    success: true
                    message: Event already processed
        '400':
          description: Request validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
              examples:
                invalidBody:
                  value:
                    success: false
                    message: Request body must be a JSON object
                missingEventType:
                  value:
                    success: false
                    message: Missing event_type in payload
        '404':
          description: Invalid webhook token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
              examples:
                invalidToken:
                  value:
                    success: false
                    message: Invalid webhook token
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicError'
              examples:
                internalServerError:
                  value:
                    success: false
                    message: Internal server error
components:
  securitySchemes:
    PartnerKeyHeader:
      type: apiKey
      in: header
      name: x-partner-key
    PartnerBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
    IntegrationKeyHeader:
      type: apiKey
      in: header
      name: x-integration-key
  parameters:
    provider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum: [restrox]
    integrationKeyHeader:
      name: x-integration-key
      in: header
      required: true
      schema:
        type: string
      description: Merchant Connection Key used to resolve the store-scoped integration.
    customerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
  schemas:
    PartnerConnectRequest:
      type: object
      required: [integrationKey]
      properties:
        integrationKey:
          type: string
        account:
          type: object
          additionalProperties: true
          properties:
            id:
              type: string
            accountId:
              type: string
            name:
              type: string
            accountName:
              type: string
        locations:
          type: array
          items:
            $ref: '#/components/schemas/PartnerLocation'
    PartnerLocation:
      type: object
      additionalProperties: true
      properties:
        externalLocationId:
          type: string
        external_location_id:
          type: string
        locationId:
          type: string
        branchId:
          type: string
        id:
          type: string
        externalLocationName:
          type: string
        external_location_name:
          type: string
        locationName:
          type: string
        branchName:
          type: string
        name:
          type: string
        outletId:
          type: string
        outlet_id:
          type: string
        samparkaOutletId:
          type: string
    TestSaleRequest:
      type: object
      required: [integrationKey, payload]
      properties:
        integrationKey:
          type: string
        payload:
          $ref: '#/components/schemas/RestroxWebhookRequest'
    PartnerCustomerCreateRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
      required: [phone]
    PartnerCustomerUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        email:
          type: string
    PartnerCustomer:
      type: object
      required: [id, phone, points, lifetimePoints]
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        points:
          type: number
        tier:
          type: string
          nullable: true
        lifetimePoints:
          type: number
        membershipSince:
          type: string
          format: date-time
          nullable: true
    PartnerCustomerResponse:
      type: object
      required: [customer]
      properties:
        customer:
          $ref: '#/components/schemas/PartnerCustomer'
    PartnerCustomerUpsertResponse:
      type: object
      required: [created, customer]
      properties:
        created:
          type: boolean
        customer:
          $ref: '#/components/schemas/PartnerCustomer'
    CustomerSearchFound:
      type: object
      required: [exists, customer]
      properties:
        exists:
          const: true
        customer:
          $ref: '#/components/schemas/PartnerCustomer'
    CustomerSearchMissing:
      type: object
      required: [exists]
      properties:
        exists:
          const: false
    PartnerSuccessEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          const: true
        message:
          type: string
        data:
          type: object
          additionalProperties: true
          properties:
            syncedCount:
              type: integer
            reviewIssues:
              type: array
              items:
                type: object
                additionalProperties: true
            reviewRequired:
              type: boolean
            partnerConnectionStatus:
              type: string
              enum: [pending, connected, review_required]
    TestSaleEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/BasicResponse'
    PartnerCustomerError:
      type: object
      required: [message]
      properties:
        error:
          type: string
        message:
          type: string
    RestroxWebhookRequest:
      type: object
      additionalProperties: true
      properties:
        event_type:
          type: string
        type:
          type: string
        order_id:
          type: string
        transaction_id:
          type: string
        id:
          type: string
        created_at:
          type: string
          format: date-time
        timestamp:
          type: string
          format: date-time
        amount:
          type: number
        order_total:
          type: number
        total:
          type: number
        currency:
          type: string
        currency_code:
          type: string
        external_location_id:
          type: string
        location_id:
          type: string
        outlet_id:
          type: string
        branch_id:
          type: string
        external_location_name:
          type: string
        location_name:
          type: string
        branch_name:
          type: string
        outlet_name:
          type: string
        phone:
          type: string
        customer_phone:
          type: string
        customer:
          type: object
          additionalProperties: true
          properties:
            phone:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
    LineItem:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
        qty:
          type: number
        price:
          type: number
    BasicResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
    BasicError:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          const: false
        message:
          type: string
