openapi: 3.1.0
info:
  title: Samparka RestroX Integration API
  version: 1.2.0
  description: |
    Merchant lifecycle, partner connect, webhook verification, customer verification, and compatibility routes
    for the RestroX integration with Samparka.
    Source fixtures for examples: docs/restrox-partner-guide/examples/payloads.json
servers:
  - url: https://your-domain
paths:
  /api/pos-integrations:
    post:
      summary: Create an outlet-owned RestroX integration
      operationId: createRestroxIntegration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntegrationRequest'
      responses:
        '201':
          description: Integration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationEnvelope'
  /api/pos-integrations/{id}:
    get:
      summary: Get a RestroX integration
      operationId: getRestroxIntegration
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '200':
          description: Integration fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationEnvelope'
    delete:
      summary: Disconnect a RestroX integration
      operationId: deleteRestroxIntegration
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '200':
          description: Integration disconnected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisconnectEnvelope'
  /api/pos-integrations/{id}/locations:
    get:
      summary: Compatibility-only locations route for outlet-owned RestroX
      operationId: getRestroxLocationsCompatibility
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '409':
          description: Not supported for outlet-owned RestroX
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unsupported:
                  x-source-fixture: examples/payloads.json#/locations_route_response
                  value:
                    success: false
                    message: Locations route is not supported for outlet-owned RestroX
  /api/partners/restrox/connect:
    post:
      summary: Connect one RestroX restaurant to one outlet-owned Samparka integration
      description: |
        Connect binds a single RestroX restaurant to a single outlet-owned Samparka integration.
        The active connect contract only accepts integrationKey, restaurantId, and optional restaurantName.
      operationId: postRestroxConnect
      parameters:
        - name: x-partner-key
          in: header
          required: true
          description: Shared partner API key configured by Samparka.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestroxConnectRequest'
            examples:
              connectRequest:
                summary: Singular restaurant binding
                x-source-fixture: examples/payloads.json#/connect_request
                value:
                  integrationKey: restrox-key-001
                  restaurantId: ktm-branch-01
                  restaurantName: Kathmandu Branch
      responses:
        '200':
          description: Restaurant connected successfully or idempotently re-confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestroxConnectResponse'
              examples:
                connected:
                  summary: Connected
                  x-source-fixture: examples/payloads.json#/connect_response
                  value:
                    success: true
                    message: RestroX connected
                    connected: true
                    integrationId: 684915c401ec340433d84ee2
                    externalLocationId: ktm-branch-01
                    externalLocationName: Kathmandu Branch
                    status: CONNECTED
        '400':
          description: Request validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingRestaurantId:
                  summary: restaurantId is required
                  x-source-fixture: examples/payloads.json#/connect_validation_response
                  value:
                    success: false
                    message: restaurantId is required
        '401':
          description: Missing or invalid partner key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Invalid integration key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Rebind blocked or integration not outlet-owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/partners/restrox/test-sale:
    post:
      summary: Submit a partner-side test sale
      description: |
        Push a sale-shaped payload into the webhook processing pipeline using the integration key instead of
        posting directly to the tokenized webhook URL.
      operationId: postRestroxTestSale
      parameters:
        - name: x-partner-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestSaleRequest'
            examples:
              testSale:
                x-source-fixture: examples/payloads.json#/test_sale_request
                value:
                  integrationKey: restrox-key-001
                  payload:
                    event_type: order.completed
                    order_id: restrox-sale-1001
                    created_at: '2026-06-08T10:15:00.000Z'
                    amount: 850
                    currency: NPR
                    customer:
                      phone: '9800000101'
                      email: restrox-sale-1001@example.com
                    external_location_id: ktm-branch-01
                    external_location_name: Kathmandu Branch
                    items:
                      - name: Cappuccino
                        qty: 1
                        price: 850
      responses:
        '200':
          description: Test sale accepted into webhook processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                accepted:
                  x-source-fixture: examples/payloads.json#/event_received_response
                  value:
                    success: true
                    message: Event received
        '409':
          description: Restaurant binding missing or mismatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/partners/restrox/sync-locations:
    post:
      summary: Compatibility-only sync route for outlet-owned RestroX
      operationId: postRestroxSyncLocations
      parameters:
        - name: x-partner-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - integrationKey
              properties:
                integrationKey:
                  type: string
      responses:
        '200':
          description: Compatibility route skipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeprecatedSyncLocationsResponse'
              examples:
                skipped:
                  x-source-fixture: examples/payloads.json#/sync_locations_response
                  value:
                    success: true
                    message: Sync skipped for outlet-owned RestroX
                    data:
                      skipped: true
  /api/customers/search:
    get:
      summary: Search customers after the first sale
      description: Verify a valid RestroX sale resulted in customer resolution or creation.
      operationId: searchCustomers
      parameters:
        - name: phone
          in: query
          required: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Matching customers fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerSearchResponse'
              examples:
                customerFound:
                  x-source-fixture: examples/payloads.json#/customer_search_response
                  value:
                    success: true
                    message: Customers fetched
                    data:
                      - id: 684a00000000000000001001
                        phone: '9800000101'
                        email: restrox-sale-1001@example.com
                        storeId: 685000000000000000000010
                        businessId: 685000000000000000000010
  /api/customers/{customerId}:
    get:
      summary: Fetch customer details after loyalty processing
      description: Verify loyalty data is populated and points reflect the processed sale.
      operationId: getCustomer
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Customer fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetailsResponse'
              examples:
                customerDetails:
                  x-source-fixture: examples/payloads.json#/customer_detail_response
                  value:
                    success: true
                    message: Customer fetched
                    data:
                      id: 684a00000000000000001001
                      phone: '9800000101'
                      email: restrox-sale-1001@example.com
                      storeId: 685000000000000000000010
                      businessId: 685000000000000000000010
                      pointsBalance: 85
                      lifetimePointsEarned: 85
                      loyaltySummary:
                        lastTransactionType: SALE
                        lastTransactionReference: restrox-sale-1001
  /webhook/restrox/{token}:
    post:
      summary: Receive RestroX webhook events
      description: |
        Send RestroX sale, refund, or void webhooks to Samparka after the integration is connected.
        A 200 acknowledgment means the delivery was accepted. It does not guarantee loyalty activity was created.
      operationId: postRestroxWebhook
      parameters:
        - $ref: '#/components/parameters/WebhookToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestroxWebhookRequest'
            examples:
              saleCompleted:
                summary: Completed sale
                x-source-fixture: examples/payloads.json#/sale_completed_request
                value:
                  event_type: order.completed
                  order_id: restrox-sale-1001
                  created_at: '2026-06-08T10:15:00.000Z'
                  amount: 850
                  currency: NPR
                  customer:
                    phone: '9800000101'
                    email: restrox-sale-1001@example.com
                  external_location_id: ktm-branch-01
                  external_location_name: Kathmandu Branch
                  items:
                    - name: Cappuccino
                      qty: 1
                      price: 850
              blockedLocation:
                summary: Unknown location example
                x-source-fixture: examples/payloads.json#/blocked_location_request
                value:
                  event_type: order.completed
                  order_id: restrox-sale-2001
                  created_at: '2026-06-08T13:10:00.000Z'
                  amount: 600
                  currency: NPR
                  customer:
                    phone: '9800000103'
                  external_location_id: unknown-branch-99
                  external_location_name: Unknown Branch
                  items:
                    - name: Latte
                      qty: 1
                      price: 600
      responses:
        '200':
          description: Event accepted or duplicate acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                eventReceived:
                  x-source-fixture: examples/payloads.json#/event_received_response
                  value:
                    success: true
                    message: Event received
                eventAlreadyProcessed:
                  x-source-fixture: examples/payloads.json#/event_already_processed_response
                  value:
                    success: true
                    message: Event already processed
        '400':
          description: Request validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                invalidBody:
                  x-source-fixture: examples/payloads.json#/invalid_body_response
                  value:
                    success: false
                    message: Request body must be a JSON object
                missingEventType:
                  x-source-fixture: examples/payloads.json#/validation_failure_response
                  value:
                    success: false
                    message: Missing event_type in payload
        '404':
          description: Invalid webhook token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                invalidToken:
                  x-source-fixture: examples/payloads.json#/invalid_token_response
                  value:
                    success: false
                    message: Invalid webhook token
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                internalServerError:
                  x-source-fixture: examples/payloads.json#/internal_server_error_response
                  value:
                    success: false
                    message: Internal server error
components:
  parameters:
    IntegrationId:
      name: id
      in: path
      required: true
      schema:
        type: string
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
    WebhookToken:
      name: token
      in: path
      required: true
      schema:
        type: string
  schemas:
    CreateIntegrationRequest:
      type: object
      required:
        - provider
        - storeId
        - outletId
      properties:
        provider:
          type: string
          enum: [restrox]
        storeId:
          type: string
        outletId:
          type: string
    IntegrationData:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        storeId:
          type: string
        outletId:
          type: string
        ownershipMode:
          type: string
          enum: [OUTLET_OWNED]
        connectionStatus:
          type: string
          enum: [CREATED, CONNECTED, ACTIVE, DISCONNECTED]
        healthStatus:
          type: string
          enum: [HEALTHY, WARNING, ERROR]
        integrationKey:
          type: string
        webhookUrl:
          type: string
        externalLocationId:
          type:
            - string
            - 'null'
        externalLocationName:
          type:
            - string
            - 'null'
    IntegrationEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/IntegrationData'
    DisconnectEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            disconnected:
              type: boolean
            deleted:
              type: boolean
            id:
              type: string
    RestroxConnectRequest:
      type: object
      additionalProperties: false
      required:
        - integrationKey
        - restaurantId
      properties:
        integrationKey:
          type: string
        restaurantId:
          type: string
        restaurantName:
          type: string
      description: Singular restaurant binding contract for RestroX connect.
    RestroxConnectResponse:
      type: object
      required:
        - success
        - message
        - connected
        - integrationId
        - externalLocationId
        - status
      properties:
        success:
          type: boolean
        message:
          type: string
        connected:
          type: boolean
        idempotent:
          type: boolean
        integrationId:
          type: string
        externalLocationId:
          type: string
        externalLocationName:
          type:
            - string
            - 'null'
        status:
          type: string
    TestSaleRequest:
      type: object
      required:
        - integrationKey
        - payload
      properties:
        integrationKey:
          type: string
        payload:
          $ref: '#/components/schemas/RestroxWebhookRequest'
    RestroxWebhookRequest:
      type: object
      additionalProperties: true
      properties:
        event_type:
          type: string
        type:
          type: string
        order_id:
          type: string
        transaction_id:
          type: string
        id:
          type: string
        created_at:
          type: string
          format: date-time
        timestamp:
          type: string
          format: date-time
        amount:
          type: number
        order_total:
          type: number
        total:
          type: number
        currency:
          type: string
        currency_code:
          type: string
        external_location_id:
          type: string
        location_id:
          type: string
        outlet_id:
          type: string
        branch_id:
          type: string
        external_location_name:
          type: string
        location_name:
          type: string
        branch_name:
          type: string
        outlet_name:
          type: string
        phone:
          type: string
        customer_phone:
          type: string
        customer:
          type: object
          additionalProperties: true
          properties:
            phone:
              type: string
            email:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
      description: Request payload fields consumed by Samparka for the RestroX webhook.
    LineItem:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
        qty:
          type: number
        price:
          type: number
    CustomerRecord:
      type: object
      properties:
        id:
          type: string
        phone:
          type:
            - string
            - 'null'
        email:
          type:
            - string
            - 'null'
        storeId:
          type:
            - string
            - 'null'
        businessId:
          type:
            - string
            - 'null'
        pointsBalance:
          type:
            - number
            - 'null'
        lifetimePointsEarned:
          type:
            - number
            - 'null'
        loyaltySummary:
          type:
            - object
            - 'null'
          properties:
            lastTransactionType:
              type: string
            lastTransactionReference:
              type: string
    CustomerSearchResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/CustomerRecord'
    CustomerDetailsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/CustomerRecord'
    DeprecatedSyncLocationsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            skipped:
              type: boolean
    BasicResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string
