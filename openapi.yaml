openapi: 3.1.0
info:
  title: Samparka POS Integration API
  version: 1.2.0
  description: |
    Partner connect, webhook, and customer routes for the POS integration with Samparka.
    Source fixtures for examples: docs/pos-partner-guide/examples/payloads.json
servers:
  - url: https://your-domain
paths:
  /api/partners/{provider}/connect:
    post:
      summary: Connect one POS restaurant to one outlet-owned Samparka integration
      description: |
        Connect binds a single POS restaurant to a single outlet-owned Samparka integration.
        The active connect contract only accepts integrationKey, restaurantId, and optional restaurantName.
      operationId: postPosConnect
      parameters:
        - name: x-partner-key
          in: header
          required: true
          description: Shared partner API key configured by Samparka.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PosConnectRequest'
            examples:
              connectRequest:
                summary: Singular restaurant binding
                x-source-fixture: examples/payloads.json#/connect_request
                value:
                  integrationKey: pos-key-001
                  restaurantId: ktm-branch-01
                  restaurantName: Kathmandu Branch
      responses:
        '200':
          description: Restaurant connected successfully or idempotently re-confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PosConnectResponse'
              examples:
                connected:
                  summary: Connected
                  x-source-fixture: examples/payloads.json#/connect_response
                  value:
                    success: true
                    integrationId: 684915c401ec340433d84ee2
                    token: abcxyz
                    status: CONNECTED
        '400':
          description: Request validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingRestaurantId:
                  summary: restaurantId is required
                  x-source-fixture: examples/payloads.json#/connect_validation_response
                  value:
                    success: false
                    message: restaurantId is required
        '401':
          description: Missing or invalid partner key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Invalid integration key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Rebind blocked or integration not outlet-owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/partners/{provider}/test-sale:
    post:
      summary: Submit a partner-side test sale
      description: |
        Push a sale-shaped payload into the webhook processing pipeline using the integration key instead of
        posting directly to the tokenized webhook URL.
      operationId: postPosTestSale
      parameters:
        - name: x-partner-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestSaleRequest'
            examples:
              testSale:
                x-source-fixture: examples/payloads.json#/test_sale_request
                value:
                  integrationKey: pos-key-001
                  payload:
                    event_type: order.completed
                    order_id: pos-sale-1001
                    created_at: '2026-06-08T10:15:00.000Z'
                    amount: 850
                    currency: NPR
                    customer:
                      phone: '9800000101'
                    items:
                      - name: Cappuccino
                        qty: 1
                        price: 850
      responses:
        '200':
          description: Test sale accepted into webhook processing and wrapped by the partner controller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestSaleResponse'
              examples:
                accepted:
                  x-source-fixture: examples/payloads.json#/test_sale_success_response
                  value:
                    success: true
                    message: Test sale submitted
                    data:
                      success: true
                      message: Event received
                duplicate:
                  x-source-fixture: examples/payloads.json#/test_sale_duplicate_response
                  value:
                    success: true
                    message: Test sale submitted
                    data:
                      success: true
                      message: Event already processed
        '400':
          description: Request validation or webhook validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingEventType:
                  x-source-fixture: examples/payloads.json#/validation_failure_response
                  value:
                    success: false
                    message: Missing event_type in payload
        '404':
          description: Invalid integration key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Integration not ready for test-sale submission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingBinding:
                  x-source-fixture: examples/payloads.json#/test_sale_missing_binding_response
                  value:
                    success: false
                    message: This POS integration is not connected to a restaurant yet
                notReady:
                  x-source-fixture: examples/payloads.json#/test_sale_not_ready_response
                  value:
                    success: false
                    message: This POS integration is not ready to receive webhooks
  /api/partners/{provider}/customers/search:
    get:
      summary: Search customers after the first sale
      description: |
        Verify a valid POS sale resulted in customer resolution or creation.
        Customer lookup is partner-authenticated and integration-scoped.
        The documented contract uses `x-partner-key` and `x-integration-key`.
        The backend also supports `Authorization: Bearer {{partnerKey}}` as an alternative to `x-partner-key`.
      operationId: searchPosCustomers
      parameters:
        - name: x-partner-key
          in: header
          required: true
          description: Partner key that identifies POS.
          schema:
            type: string
        - name: x-integration-key
          in: header
          required: true
          description: Integration key that identifies the merchant or store context for the search.
          schema:
            type: string
        - name: phone
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Exact phone lookup result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerSearchResponse'
              examples:
                customerFound:
                  x-source-fixture: examples/payloads.json#/customer_search_response
                  value:
                    exists: true
                    customer:
                      id: 684a00000000000000001001
                      name: null
                      phone: '9800000101'
                      email: pos-sale-1001@example.com
                      points: 85
                      tier: null
                      lifetimePoints: 85
                      membershipSince: '2026-06-08T10:15:00.000Z'
                customerMissing:
                  x-source-fixture: examples/payloads.json#/customer_search_miss_response
                  value:
                    exists: false
        '400':
          description: Invalid phone lookup request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerErrorResponse'
        '401':
          description: Missing or invalid partner authentication or integration key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerErrorResponse'
        '403':
          description: Integration is inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerErrorResponse'
        '409':
          description: Multiple customer records match the same normalized phone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerErrorResponse'
  /api/partners/{provider}/customers/{customerId}:
    get:
      summary: Fetch customer details after loyalty processing
      description: Verify loyalty data is populated and points reflect the processed sale.
      operationId: getPosCustomer
      parameters:
        - name: x-partner-key
          in: header
          required: true
          description: Partner key that identifies POS.
          schema:
            type: string
        - name: x-integration-key
          in: header
          required: true
          description: Integration key that identifies the merchant or store context for the lookup.
          schema:
            type: string
        - $ref: '#/components/parameters/CustomerId'
      responses:
        '200':
          description: Customer fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetailsResponse'
              examples:
                customerDetails:
                  x-source-fixture: examples/payloads.json#/customer_detail_response
                  value:
                    customer:
                      id: 684a00000000000000001001
                      name: null
                      phone: '9800000101'
                      email: pos-sale-1001@example.com
                      points: 85
                      tier: null
                      lifetimePoints: 85
                      membershipSince: '2026-06-08T10:15:00.000Z'
        '401':
          description: Missing or invalid partner authentication or integration key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerErrorResponse'
        '403':
          description: Integration is inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerErrorResponse'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerCustomerErrorResponse'
  /webhook/{provider}/{token}:
    post:
      summary: Receive POS webhook events
      description: |
        Send POS sale, refund, or void webhooks to Samparka after the integration is connected.
        A 200 acknowledgment means the delivery was accepted. It does not guarantee loyalty activity was created.
        For outlet-owned POS, restaurant attribution is resolved from the integration bound to the webhook token.
      operationId: postPosWebhook
      parameters:
        - $ref: '#/components/parameters/WebhookToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PosWebhookRequest'
            examples:
              saleCompleted:
                summary: Completed sale
                x-source-fixture: examples/payloads.json#/sale_completed_request
                value:
                  event_type: order.completed
                  order_id: pos-sale-1001
                  created_at: '2026-06-08T10:15:00.000Z'
                  amount: 850
                  currency: NPR
                  customer:
                    phone: '9800000101'
                  items:
                    - name: Cappuccino
                      qty: 1
                      price: 850
      responses:
        '200':
          description: Event accepted or duplicate acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                eventReceived:
                  x-source-fixture: examples/payloads.json#/event_received_response
                  value:
                    success: true
                    message: Event received
                eventAlreadyProcessed:
                  x-source-fixture: examples/payloads.json#/event_already_processed_response
                  value:
                    success: true
                    message: Event already processed
        '400':
          description: Request validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                invalidBody:
                  x-source-fixture: examples/payloads.json#/invalid_body_response
                  value:
                    success: false
                    message: Request body must be a JSON object
                missingEventType:
                  x-source-fixture: examples/payloads.json#/validation_failure_response
                  value:
                    success: false
                    message: Missing event_type in payload
        '404':
          description: Invalid webhook token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                invalidToken:
                  x-source-fixture: examples/payloads.json#/invalid_token_response
                  value:
                    success: false
                    message: Invalid webhook token
        '409':
          description: Integration state prevents webhook processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                disconnected:
                  x-source-fixture: examples/payloads.json#/disconnected_integration_response
                  value:
                    success: false
                    message: Integration disconnected
                missingBinding:
                  x-source-fixture: examples/payloads.json#/missing_binding_response
                  value:
                    success: false
                    message: Integration is not connected to a restaurant
                notReady:
                  x-source-fixture: examples/payloads.json#/not_ready_response
                  value:
                    success: false
                    message: Integration is not ready to receive webhooks
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicResponse'
              examples:
                internalServerError:
                  x-source-fixture: examples/payloads.json#/internal_server_error_response
                  value:
                    success: false
                    message: Internal server error
components:
  parameters:
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
    WebhookToken:
      name: token
      in: path
      required: true
      schema:
        type: string
  schemas:
    PosConnectRequest:
      type: object
      additionalProperties: false
      required:
        - integrationKey
        - restaurantId
      properties:
        integrationKey:
          type: string
        restaurantId:
          type: string
        restaurantName:
          type: string
      description: Singular restaurant binding contract for POS connect.
    PosConnectResponse:
      type: object
      required:
        - success
        - integrationId
        - token
        - status
      properties:
        success:
          type: boolean
        integrationId:
          type: string
        token:
          type: string
        status:
          type: string
    TestSaleRequest:
      type: object
      required:
        - integrationKey
        - payload
      properties:
        integrationKey:
          type: string
        payload:
          $ref: '#/components/schemas/PosWebhookRequest'
    TestSaleResponse:
      type: object
      required:
        - success
        - message
        - data
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/BasicResponse'
    PosWebhookRequest:
      type: object
      additionalProperties: true
      properties:
        event_type:
          type: string
        type:
          type: string
        order_id:
          type: string
        transaction_id:
          type: string
        id:
          type: string
        created_at:
          type: string
          format: date-time
        timestamp:
          type: string
          format: date-time
        amount:
          type: number
        order_total:
          type: number
        total:
          type: number
        currency:
          type: string
        currency_code:
          type: string
        external_location_id:
          type: string
          description: Optional non-canonical restaurant metadata for outlet-owned attribution.
        location_id:
          type: string
          description: Optional non-canonical restaurant metadata for outlet-owned attribution.
        outlet_id:
          type: string
          description: Optional non-canonical restaurant metadata for outlet-owned attribution.
        branch_id:
          type: string
          description: Optional non-canonical restaurant metadata for outlet-owned attribution.
        external_location_name:
          type: string
          description: Optional non-canonical restaurant label.
        location_name:
          type: string
          description: Optional non-canonical restaurant label.
        branch_name:
          type: string
          description: Optional non-canonical restaurant label.
        outlet_name:
          type: string
          description: Optional non-canonical restaurant label.
        phone:
          type: string
        customer_phone:
          type: string
        customer:
          type: object
          additionalProperties: true
          properties:
            phone:
              type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
      description: Request payload fields consumed by Samparka for the POS webhook. Restaurant identity is resolved from the integration binding, not from payload restaurant fields.
    LineItem:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
        qty:
          type: number
        price:
          type: number
    CustomerRecord:
      type: object
      properties:
        id:
          type: string
        name:
          type:
            - string
            - 'null'
        phone:
          type:
            - string
            - 'null'
        email:
          type:
            - string
            - 'null'
        points:
          type:
            - number
            - 'null'
        tier:
          type:
            - string
            - 'null'
        lifetimePoints:
          type:
            - number
            - 'null'
        membershipSince:
          type:
            - string
            - 'null'
    CustomerSearchResponse:
      type: object
      properties:
        exists:
          type: boolean
        customer:
          $ref: '#/components/schemas/CustomerRecord'
    CustomerDetailsResponse:
      type: object
      properties:
        customer:
          $ref: '#/components/schemas/CustomerRecord'
    BasicResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string
    PartnerCustomerErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
