openapi: 3.1.0
info:
  title: Samparka RestroX Outlet-Owned API
  version: 1.0.0
  description: >
    Reference for the current outlet-owned RestroX implementation in Samparka.
servers:
  - url: https://your-domain
paths:
  /api/pos-integrations:
    post:
      summary: Create a RestroX integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntegrationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationEnvelope'
  /api/pos-integrations/{id}:
    get:
      summary: Get a RestroX integration
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationEnvelope'
    patch:
      summary: Update a RestroX integration
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                outletId:
                  type: string
                status:
                  type: string
                  enum: [CREATED, CONNECTED, ACTIVE, DISCONNECTED]
                health_status:
                  type: string
                  enum: [HEALTHY, WARNING, ERROR]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationEnvelope'
    delete:
      summary: Disconnect an outlet-owned RestroX integration
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '200':
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisconnectEnvelope'
  /api/pos-integrations/{id}/status:
    get:
      summary: Get derived RestroX status
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusEnvelope'
  /api/pos-integrations/{id}/verify:
    post:
      summary: Verify production readiness
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEnvelope'
  /api/pos-integrations/{id}/webhook-url:
    get:
      summary: Get integration webhook URL
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      webhookUrl:
                        type: string
  /api/pos-integrations/{id}/locations:
    get:
      summary: Shared POS route not applicable to outlet-owned RestroX
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '409':
          description: Not applicable to outlet-owned RestroX
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Shared POS route not applicable to outlet-owned RestroX
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '409':
          description: Not applicable to outlet-owned RestroX
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/pos-integrations/{id}/sync-outlets:
    post:
      summary: Shared POS route not applicable to outlet-owned RestroX
      parameters:
        - $ref: '#/components/parameters/IntegrationId'
      responses:
        '409':
          description: Not applicable to outlet-owned RestroX
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/partners/restrox/connect:
    post:
      summary: Connect a RestroX restaurant to an outlet-owned integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectRequest'
      responses:
        '200':
          description: Connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectEnvelope'
        '409':
          description: Duplicate bind or invalid rebind
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/partners/restrox/sync-locations:
    post:
      summary: No-op response for outlet-owned RestroX
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectRequest'
      responses:
        '200':
          description: Skipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncLocationsEnvelope'
  /api/partners/restrox/test-sale:
    post:
      summary: Submit a test sale through the webhook pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestSaleRequest'
      responses:
        '200':
          description: Accepted into webhook processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestSaleEnvelope'
        '409':
          description: Restaurant binding missing or mismatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/partners/{provider}/customers/search:
    get:
      summary: Search customers by exact phone
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [restrox]
        - name: phone
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
  /api/partners/{provider}/customers/{customerId}:
    get:
      summary: Fetch one customer
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [restrox]
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
  /webhook/restrox/{token}:
    post:
      summary: Receive RestroX webhook events
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestroxWebhookRequest'
      responses:
        '200':
          description: Accepted or duplicate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSuccessResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Binding or lifecycle conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    IntegrationId:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    CreateIntegrationRequest:
      type: object
      required: [provider, storeId, outletId]
      properties:
        provider:
          type: string
          enum: [restrox]
        storeId:
          type: string
        outletId:
          type: string
    ConnectLocation:
      type: object
      properties:
        restaurantId:
          type: string
        restaurantName:
          type: string
    ConnectRequest:
      type: object
      required: [integrationKey]
      properties:
        integrationKey:
          type: string
        account:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        locations:
          type: array
          items:
            $ref: '#/components/schemas/ConnectLocation'
    TestSaleRequest:
      type: object
      required: [integrationKey, payload]
      properties:
        integrationKey:
          type: string
        locationId:
          type: string
          nullable: true
        payload:
          $ref: '#/components/schemas/RestroxWebhookRequest'
    RestroxWebhookRequest:
      type: object
      required: [event_type]
      properties:
        event_type:
          type: string
        order_id:
          type: string
        created_at:
          type: string
        amount:
          type: number
        currency:
          type: string
        restaurantId:
          type: string
        restaurantName:
          type: string
        external_location_id:
          type: string
        external_location_name:
          type: string
    IntegrationData:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        storeId:
          type: string
        outletId:
          type: string
          nullable: true
        ownershipMode:
          type: string
          enum: [OUTLET_OWNED]
        status:
          type: string
        connectionStatus:
          type: string
          enum: [CREATED, CONNECTED, ACTIVE, DISCONNECTED]
        integrationKey:
          type: string
        webhookUrl:
          type: string
          nullable: true
        webhookUrlMasked:
          type: string
          nullable: true
        externalLocationId:
          type: string
          nullable: true
        externalLocationName:
          type: string
          nullable: true
        healthStatus:
          type: string
          enum: [HEALTHY, WARNING, ERROR]
        partnerConnectionStatus:
          type: string
          enum: [pending, connected, review_required]
    IntegrationEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/IntegrationData'
    DisconnectEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            disconnected:
              type: boolean
            deleted:
              type: boolean
            id:
              type: string
    StatusEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            overallStatus:
              type: string
            connectionStatus:
              type: string
            healthStatus:
              type: string
            currentStep:
              type: string
    VerifyEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            readyForProduction:
              type: boolean
            currentStep:
              type: string
    ConnectEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            connected:
              type: boolean
            idempotent:
              type: boolean
            integrationId:
              type: string
            externalLocationId:
              type: string
            externalLocationName:
              type: string
              nullable: true
            status:
              type: string
              enum: [CONNECTED, ACTIVE, DISCONNECTED, CREATED]
    SyncLocationsEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            connected:
              type: boolean
            skipped:
              type: boolean
            integrationId:
              type: string
            message:
              type: string
    TestSaleEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/WebhookSuccessResponse'
    WebhookSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
